<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語教材</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #F0F7FF;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 16px;
}
h1 {
  font-size: 26px;
  font-weight: 900;
  color: #1A2840;
  margin-bottom: 8px;
}
.subtitle {
  font-size: 13px;
  color: #5A7080;
  margin-bottom: 40px;
}
.cards {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
  max-width: 700px;
}
.card {
  background: #fff;
  border-radius: 16px;
  border: 2px solid #B8D8F0;
  padding: 28px 32px;
  text-decoration: none;
  color: #1A2840;
  width: 300px;
  transition: box-shadow 0.15s, transform 0.15s;
  display: flex;
  align-items: center;
  gap: 18px;
}
.card:hover {
  box-shadow: 0 6px 24px rgba(68,150,200,0.18);
  transform: translateY(-2px);
}
.card-icon { font-size: 36px; flex-shrink: 0; }
.card-label {
  font-size: 11px;
  font-weight: 700;
  color: #4496C8;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.card-title {
  font-size: 17px;
  font-weight: 900;
}
.card-desc {
  font-size: 11px;
  color: #5A7080;
  margin-top: 4px;
}
</style>
</head>
<body>
  <h1>🇯🇵 日本語教材</h1>
  <div class="subtitle">第1課　わたしはマリアです。</div>
  <div class="cards">
    <a class="card" href="./第1課_スライド.html">
      <div class="card-icon">📊</div>
      <div>
        <div class="card-label">SLIDE</div>
        <div class="card-title">第1課 スライド</div>
        <div class="card-desc">授業進行用・10枚構成</div>
      </div>
    </a>
    <a class="card" href="./第1課_宿題.html">
      <div class="card-icon">📝</div>
      <div>
        <div class="card-label">HOMEWORK</div>
        <div class="card-title">第1課 宿題</div>
        <div class="card-desc">学習者向け練習アプリ</div>
      </div>
    </a>
  </div>
</body>
</html>
