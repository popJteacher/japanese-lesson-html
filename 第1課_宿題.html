<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第1課　宿題アプリ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap');

  :root {
    --blue:      #4496C8;
    --blue-bg:   #EAF4FF;
    --blue-dark: #1A5F8A;
    --text:      #1A2840;
    --muted:     #6B7E96;
    --border:    #D4E4F0;
    --white:     #FFFFFF;
    --correct:   #2A8840;
    --wrong:     #C0392B;
    --radius:    14px;
    --shadow:    0 2px 16px rgba(68,150,200,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #F2F8FD;
    color: var(--text);
    min-height: 100vh;
  }

  /* ── ヘッダー */
  header {
    background: var(--white);
    border-bottom: 3px solid var(--blue);
    padding: 14px 20px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header-title {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--blue-dark);
    line-height: 1.3;
  }
  .header-title span { font-size: 12px; font-family: 'Noto Sans JP', sans-serif; color: var(--muted); display: block; font-weight: 400; }

  .toggles {
    display: flex;
    gap: 10px;
  }
  .toggle-btn {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--blue);
    background: var(--white);
    color: var(--blue-dark);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .toggle-btn.active { background: var(--blue); color: var(--white); }

  /* ── スコアバー */
  .score-bar {
    background: var(--blue-bg);
    padding: 6px 20px;
    font-size: 13px;
    color: var(--blue-dark);
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .score-bar span { font-weight: 700; }

  /* ── モード選択 */
  #mode-screen {
    max-width: 480px;
    margin: 30px auto;
    padding: 0 20px;
  }
  .mode-lead {
    text-align: center;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 20px;
    letter-spacing: 0.03em;
  }
  .mode-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 18px 20px;
    margin-bottom: 12px;
    border-radius: var(--radius);
    border: 2px solid var(--border);
    background: var(--white);
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
    box-shadow: var(--shadow);
  }
  .mode-btn:hover { border-color: var(--blue); box-shadow: 0 4px 20px rgba(68,150,200,0.18); transform: translateY(-1px); }
  .mode-btn .mode-ja { font-size: 17px; font-weight: 700; color: var(--blue-dark); }
  .mode-btn .mode-en { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .mode-btn .mode-icon { font-size: 28px; margin-bottom: 8px; }

  /* ── メイン画面 */
  #main-screen { display: none; max-width: 520px; margin: 0 auto; padding: 20px; }

  .back-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    padding: 0;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .back-btn:hover { color: var(--blue-dark); }

  .progress-wrap { margin-bottom: 18px; }
  .progress-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--blue); border-radius: 3px; transition: width 0.4s ease; }

  /* ── カード */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px 20px 20px;
    margin-bottom: 16px;
  }

  /* ふりがな */
  ruby rt { font-size: 0.55em; color: inherit; }

  /* 単語表示 */
  .word-display {
    text-align: center;
    margin-bottom: 20px;
  }
  .word-main {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 42px;
    font-weight: 700;
    line-height: 1.4;
  }
  .word-reading { font-size: 14px; color: var(--muted); margin-top: 2px; }
  .word-english { font-size: 14px; color: var(--muted); margin-top: 2px; font-style: italic; }

  /* イラスト */
  .illust-wrap {
    text-align: center;
    margin-bottom: 18px;
  }
  .illust-wrap img {
    height: 140px;
    object-fit: contain;
    border-radius: 10px;
  }
  .illust-wrap .illust-fallback {
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
    background: var(--blue-bg);
    border-radius: 10px;
  }

  /* 選択肢 */
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 10px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--white);
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.15s, background 0.15s;
    font-size: 16px;
    font-weight: 700;
    color: #000;
    line-height: 1.4;
    text-align: center;
  }
  .choice-btn .choice-en { font-size: 11px; font-weight: 400; color: #000; margin-top: 3px; }
  .choice-btn:hover:not(:disabled) { border-color: var(--blue); background: var(--blue-bg); }
  .choice-btn.correct  { border-color: var(--correct); background: #E8F8EC; }
  .choice-btn.wrong    { border-color: var(--wrong);   background: #FDECEA; }
  .choice-btn:disabled { cursor: default; }

  /* アクションボタン横並び */
  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    justify-content: center;
  }
  .action-btn {
    flex: 1;
    max-width: 200px;
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    background: var(--blue-dark);
    color: var(--white);
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .action-btn:hover { background: #154E73; transform: translateY(-1px); }
  .action-btn.secondary { background: var(--white); color: var(--blue-dark); border: 2px solid var(--blue-dark); }
  .action-btn.secondary:hover { background: var(--blue-bg); }
  .action-btn.playing { background: var(--white); color: var(--blue-dark); border: 2px solid var(--blue-dark); }

  /* フィードバック */
  .feedback {
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    margin-top: 12px;
    display: none;
  }
  .feedback.correct { background: #E8F8EC; border-left: 4px solid var(--correct); }
  .feedback.wrong   { background: #FDECEA; border-left: 4px solid var(--wrong); }
  .feedback.show    { display: block; }

  /* ── モード2：文を並べる */
  .sentence-target {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 14px;
  }
  .answer-area {
    min-height: 56px;
    background: var(--blue-bg);
    border: 2px dashed var(--blue);
    border-radius: 10px;
    padding: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
    align-items: center;
  }
  .word-pool {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
    min-height: 48px;
  }
  .word-card {
    padding: 8px 14px;
    border-radius: 8px;
    border: 2px solid var(--blue);
    background: var(--white);
    font-size: 15px;
    font-weight: 700;
    color: var(--blue-dark);
    cursor: pointer;
    transition: transform 0.1s, background 0.1s;
    user-select: none;
  }
  .word-card:hover { background: var(--blue-bg); transform: translateY(-1px); }
  .word-card.placed { border-color: var(--blue-dark); background: var(--blue-bg); }
  .word-card.in-answer { background: var(--blue); color: var(--white); border-color: var(--blue-dark); }

  /* ── モード3：例文を聞く */
  .sentence-display {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    line-height: 2;
    margin-bottom: 8px;
  }
  .sentence-english {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 18px;
    font-style: italic;
  }
  .listen-hint {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  /* 完了画面 */
  #done-screen {
    display: none;
    max-width: 400px;
    margin: 40px auto;
    padding: 20px;
    text-align: center;
  }
  .done-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 36px 24px;
  }
  .done-icon { font-size: 56px; margin-bottom: 12px; }
  .done-title { font-family: 'Noto Sans JP', sans-serif; font-size: 22px; font-weight: 700; color: var(--blue-dark); margin-bottom: 8px; }
  .done-score { font-size: 40px; font-weight: 700; color: var(--blue); margin: 12px 0; }
  .done-msg { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <ruby>第<rt>だい</rt></ruby>1<ruby>課<rt>か</rt></ruby>　<ruby>宿題<rt>しゅくだい</rt></ruby>
    <span>Lesson 1 — Homework</span>
  </div>
  <div class="toggles">
    <button class="toggle-btn active" id="btn-furigana" onclick="toggleFurigana()">ふりがな ON</button>
    <button class="toggle-btn active" id="btn-english"  onclick="toggleEnglish()"><ruby>英語<rt>えいご</rt></ruby> ON</button>
  </div>
</header>

<div class="score-bar">
  <ruby>正解<rt>せいかい</rt></ruby> <span id="score-correct">0</span> ／ <span id="score-total">0</span>　<ruby>問<rt>もん</rt></ruby>
</div>

<!-- ── モード選択 -->
<div id="mode-screen">
  <p class="mode-lead" style="margin-top:24px">モードを<ruby>選<rt>えら</rt></ruby>んでください<br><small class="eng" style="color:#aaa">Choose a practice mode</small></p>

  <button class="mode-btn" onclick="startMode(1)">
    <div class="mode-icon">🖼️</div>
    <div class="mode-ja"><ruby>絵<rt>え</rt></ruby>を<ruby>見<rt>み</rt></ruby>て<ruby>選<rt>えら</rt></ruby>ぶ</div>
    <div class="mode-en eng">Choose the word from the picture</div>
  </button>
  <button class="mode-btn" onclick="startMode(2)">
    <div class="mode-icon">🔀</div>
    <div class="mode-ja"><ruby>文<rt>ぶん</rt></ruby>を<ruby>並<rt>なら</rt></ruby>べる</div>
    <div class="mode-en eng">Put the words in order</div>
  </button>
  <button class="mode-btn" onclick="startMode(3)">
    <div class="mode-icon">🔊</div>
    <div class="mode-ja"><ruby>例文<rt>れいぶん</rt></ruby>を<ruby>聞<rt>き</rt></ruby>く</div>
    <div class="mode-en eng">Listen to the example sentence</div>
  </button>
</div>

<!-- ── メイン画面 -->
<div id="main-screen" style="display:none">
  <button class="back-btn" onclick="goHome()">← <ruby>戻<rt>もど</rt></ruby>る <span class="eng" style="font-size:11px;color:var(--muted)">/ Back</span></button>

  <div class="progress-wrap">
    <div class="progress-label" id="progress-label">1 / 7</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <!-- モード1 -->
  <div id="mode1-body">
    <div class="card">
      <div class="illust-wrap" id="m1-illust"></div>
      <div class="choices" id="m1-choices"></div>
      <div class="feedback" id="m1-feedback"></div>
    </div>
    <div class="action-row">
      <button class="action-btn" id="m1-next" onclick="nextQ()" style="display:none"><ruby>次<rt>つぎ</rt></ruby>へ <span class="eng">/ Next</span> →</button>
    </div>
  </div>

  <!-- モード2 -->
  <div id="mode2-body" style="display:none">
    <div class="card">
      <p class="sentence-target" id="m2-hint"></p>
      <div class="answer-area" id="m2-answer" onclick="removeFromAnswer(event)"></div>
      <div class="word-pool"   id="m2-pool"></div>
      <div class="feedback" id="m2-feedback"></div>
    </div>
    <div class="action-row">
      <button class="action-btn secondary" onclick="resetPool()">リセット <span class="eng">/ Reset</span></button>
      <button class="action-btn" id="m2-check" onclick="checkOrder()"><ruby>答<rt>こた</rt></ruby>え<ruby>合<rt>あ</rt></ruby>わせ <span class="eng">/ Check</span></button>
    </div>
    <div class="action-row" style="margin-top:6px">
      <button class="action-btn" id="m2-next" onclick="nextQ()" style="display:none"><ruby>次<rt>つぎ</rt></ruby>へ <span class="eng">/ Next</span> →</button>
    </div>
  </div>

  <!-- モード3 -->
  <div id="mode3-body" style="display:none">
    <div class="card">
      <div class="word-display">
        <div class="word-main" id="m3-word"></div>
        <div class="word-english" id="m3-english"></div>
      </div>
      <div class="illust-wrap" id="m3-illust"></div>
      <p class="listen-hint"><ruby>例文<rt>れいぶん</rt></ruby>を<ruby>聞<rt>き</rt></ruby>いてみよう<br><span class="eng" style="font-size:11px">Let's listen to the example sentence</span></p>
      <div class="sentence-display" id="m3-sentence"></div>
      <div class="sentence-english" id="m3-sentence-en"></div>
    </div>
    <div class="action-row">
      <button class="action-btn" id="m3-listen" onclick="speakSentence()">🔊 タップして<ruby>聞<rt>き</rt></ruby>く <span class="eng">/ Listen</span></button>
      <button class="action-btn" onclick="nextQ()"><ruby>次<rt>つぎ</rt></ruby>へ <span class="eng">/ Next</span> →</button>
    </div>
  </div>
</div>

<!-- ── 完了画面 -->
<div id="done-screen">
  <div class="done-card">
    <div class="done-icon">🎉</div>
    <div class="done-title">よくできました！</div>
    <div class="done-score" id="done-score">0 / 0</div>
    <div class="done-msg" id="done-msg"></div>
    <div class="action-row" style="justify-content:center">
      <button class="action-btn" onclick="goHome()" style="max-width:240px">もう<ruby>一度<rt>いちど</rt></ruby>やる<br><small class="eng" style="font-weight:400;font-size:11px">Try again</small></button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// 語彙データ（第1課）
// ══════════════════════════════════════════════
const VOCAB = [
  { word:'医者',   reading:'いしゃ',       en:'doctor',           ex:'田中さんは医者です。',     exEn:'Tanaka-san is a doctor.',         exWords:['田中さん','は','医者','です。'],     color:'#4496C8', bg:'#EAF4FF', emoji:'👨‍⚕️', image:'./images/vocab_医者.png',  irasutoya:'https://1.bp.blogspot.com/-2aQ3ovS0WiI/VjqeMjmJuXI/AAAAAAAAzLw/O8KLPQ1jVrc/s800/job_isha.png' },
  { word:'男の人', reading:'おとこのひと', en:'man',              ex:'リンさんは男の人です。',   exEn:'Lin-san is a man.',               exWords:['リンさん','は','男の人','です。'],   color:'#7B5EA8', bg:'#EDE6FF', emoji:'👨',    image:'./images/vocab_男の人.png', irasutoya:'https://2.bp.blogspot.com/-lrVzXZMrIWs/VjqeMjv_PJI/AAAAAAAAzLs/ORn_3xWNMIA/s800/hito_man.png' },
  { word:'女の人', reading:'おんなのひと', en:'woman',            ex:'マリアさんは女の人です。', exEn:'Maria-san is a woman.',           exWords:['マリアさん','は','女の人','です。'], color:'#C05888', bg:'#FFE8F4', emoji:'👩',    image:'./images/vocab_女の人.png', irasutoya:'https://2.bp.blogspot.com/-cSm6GiobPy4/VjqeMhs7gAI/AAAAAAAAzLo/8s2vAH1fC3c/s800/hito_woman.png' },
  { word:'外国人', reading:'がいこくじん', en:'foreigner',        ex:'ケリーさんは外国人です。', exEn:'Kelly-san is a foreigner.',       exWords:['ケリーさん','は','外国人','です。'], color:'#1A78A8', bg:'#DCF0FF', emoji:'🌍',   image:'./images/vocab_外国人.png',  irasutoya:'https://2.bp.blogspot.com/-9j_aGrXCt4E/VjqeMpBXKuI/AAAAAAAAzL0/YEJfhfxRG5E/s800/hito_gaikokujin_woman.png' },
  { word:'会社員', reading:'かいしゃいん', en:'company employee', ex:'ケリーさんは会社員です。', exEn:'Kelly-san is a company employee.',exWords:['ケリーさん','は','会社員','です。'], color:'#A87820', bg:'#FFF5D0', emoji:'💼',   image:'./images/vocab_会社員.png', irasutoya:'https://1.bp.blogspot.com/-fDOPwsI0MoQ/VjqeMpEuSdI/AAAAAAAAzL4/YEZqL1E2OW4/s800/job_kaisyain_man.png' },
  { word:'学生',   reading:'がくせい',     en:'student',          ex:'リンさんは学生です。',     exEn:'Lin-san is a student.',           exWords:['リンさん','は','学生','です。'],     color:'#2A8840', bg:'#E4F8E4', emoji:'📚',   image:'./images/vocab_学生.png', irasutoya:'https://2.bp.blogspot.com/-SsQUhq5lbCY/VjqeMpLuD5I/AAAAAAAAzMA/2YuNLUfgMa4/s800/job_gakusei_boy.png' },
  { word:'先生',   reading:'せんせい',     en:'teacher',          ex:'マリアさんは先生です。',   exEn:'Maria-san is a teacher.',         exWords:['マリアさん','は','先生','です。'],   color:'#C06820', bg:'#FFE8D0', emoji:'👩‍🏫', image:'./images/vocab_先生.png', irasutoya:'https://1.bp.blogspot.com/-rGdInniS8r0/VjqeMpCEOyI/AAAAAAAAzL8/PbMHHAHRNTI/s800/job_sensei_woman.png' },
];

// 単語→ふりがな付きHTML（モード2の単語カードや文構築時に使用）
const WORD_RUBY = {
  '田中さん':  '<ruby>田中<rt>たなか</rt></ruby>さん',
  'リンさん':  'リンさん',
  'マリアさん':'マリアさん',
  'ケリーさん':'ケリーさん',
  'は':       'は',
  'です。':    'です。',
  '医者':     '<ruby>医者<rt>いしゃ</rt></ruby>',
  '男の人':   '<ruby>男<rt>おとこ</rt></ruby>の<ruby>人<rt>ひと</rt></ruby>',
  '女の人':   '<ruby>女<rt>おんな</rt></ruby>の<ruby>人<rt>ひと</rt></ruby>',
  '外国人':   '<ruby>外国人<rt>がいこくじん</rt></ruby>',
  '会社員':   '<ruby>会社員<rt>かいしゃいん</rt></ruby>',
  '学生':     '<ruby>学生<rt>がくせい</rt></ruby>',
  '先生':     '<ruby>先生<rt>せんせい</rt></ruby>',
};
// 単語のふりがな付きHTMLを取得（未登録ならそのまま）
function rubifyWord(w) {
  return WORD_RUBY[w] || w;
}
// 任意の文字列内の登録単語を一括でルビ化（長いキーから優先）
function rubifySentence(text) {
  let result = text;
  Object.keys(WORD_RUBY).sort((a,b) => b.length - a.length).forEach(k => {
    result = result.split(k).join(WORD_RUBY[k]);
  });
  return result;
}

// ══════════════════════════════════════════════
// 状態
// ══════════════════════════════════════════════
let mode = 0, qIdx = 0, order = [], scoreCorrect = 0, scoreTotal = 0;
let showFurigana = true, showEnglish = true;
let answerWords = [], poolWords = [];
let utterance = null;

// ══════════════════════════════════════════════
// トグル
// ══════════════════════════════════════════════
function toggleFurigana() {
  showFurigana = !showFurigana;
  const btn = document.getElementById('btn-furigana');
  btn.textContent = showFurigana ? 'ふりがな ON' : 'ふりがな OFF';
  btn.classList.toggle('active', showFurigana);
  applyFuriganaState();
}
function toggleEnglish() {
  showEnglish = !showEnglish;
  const btn = document.getElementById('btn-english');
  btn.innerHTML = showEnglish
    ? '<ruby>英語<rt>えいご</rt></ruby> ON'
    : '<ruby>英語<rt>えいご</rt></ruby> OFF';
  btn.classList.toggle('active', showEnglish);
  applyEnglishState();
}
function applyEnglishState() {
  const disp = showEnglish ? '' : 'none';
  document.querySelectorAll('.word-english, .choice-en, .sentence-english, .eng').forEach(el => el.style.display = disp);
}

// ふりがなHTML生成
function furigana(word, reading, color) {
  const vis = showFurigana ? 'visible' : 'hidden';
  return `<ruby style="color:${color}">${word}<rt style="color:${color};visibility:${vis}">${reading}</rt></ruby>`;
}
function applyFuriganaState() {
  const vis = showFurigana ? 'visible' : 'hidden';
  document.querySelectorAll('rt').forEach(rt => rt.style.visibility = vis);
}

// ══════════════════════════════════════════════
// 画面遷移
// ══════════════════════════════════════════════
function goHome() {
  cancelSpeak();
  document.getElementById('mode-screen').style.display = 'block';
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('done-screen').style.display = 'none';
}
function showMain() {
  document.getElementById('mode-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  document.getElementById('done-screen').style.display = 'none';
}
function showDone() {
  document.getElementById('mode-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('done-screen').style.display = 'block';
  document.getElementById('done-score').textContent = scoreCorrect + ' / ' + scoreTotal;
  const pct = scoreTotal ? Math.round(scoreCorrect/scoreTotal*100) : 0;
  let msg = pct===100 ? 'パーフェクト！すばらしい！🌟' : pct>=70 ? 'よくできました！もう<ruby>一度<rt>いちど</rt></ruby>やってみよう。' : 'もう<ruby>少<rt>すこ</rt></ruby>し！もう<ruby>一度<rt>いちど</rt></ruby><ruby>練習<rt>れんしゅう</rt></ruby>しよう。';
  document.getElementById('done-msg').innerHTML = msg;
}

function updateScore() {
  document.getElementById('score-correct').textContent = scoreCorrect;
  document.getElementById('score-total').textContent   = scoreTotal;
}
function updateProgress() {
  const total = order.length;
  const pct   = Math.round(qIdx/total*100);
  document.getElementById('progress-label').textContent = (qIdx+1) + ' / ' + total;
  document.getElementById('progress-fill').style.width  = pct + '%';
}

// ══════════════════════════════════════════════
// モード開始
// ══════════════════════════════════════════════
function startMode(m) {
  mode = m;
  qIdx = 0;
  scoreCorrect = 0;
  scoreTotal   = 0;
  order = shuffle([...Array(VOCAB.length).keys()]);
  updateScore();
  showMain();

  document.getElementById('mode1-body').style.display = m===1 ? '' : 'none';
  document.getElementById('mode2-body').style.display = m===2 ? '' : 'none';
  document.getElementById('mode3-body').style.display = m===3 ? '' : 'none';

  renderQ();
}

function nextQ() {
  cancelSpeak();
  qIdx++;
  if (qIdx >= order.length) { showDone(); return; }
  renderQ();
}

function renderQ() {
  updateProgress();
  const v = VOCAB[order[qIdx]];
  if      (mode===1) renderMode1(v);
  else if (mode===2) renderMode2(v);
  else               renderMode3(v);
  applyFuriganaState();
  applyEnglishState();
}

// ══════════════════════════════════════════════
// モード1：絵を見て選ぶ
// ══════════════════════════════════════════════
function renderMode1(v) {
  document.getElementById('m1-feedback').className = 'feedback';
  document.getElementById('m1-feedback').innerHTML = '';
  document.getElementById('m1-next').style.display = 'none';

  // イラスト
  const il = document.getElementById('m1-illust');
  setIllust(il, v, 130);

  // 選択肢4つ（正解＋ランダム3つ）
  const others = shuffle(VOCAB.filter(x=>x.word!==v.word)).slice(0,3);
  const choices = shuffle([v, ...others]);
  const chEl = document.getElementById('m1-choices');
  chEl.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span>${rubifyWord(c.word)}</span><span class="choice-en" style="display:${showEnglish?'':'none'}">${c.en}</span>`;
    btn.onclick = () => checkChoice1(c.word===v.word, v, btn);
    chEl.appendChild(btn);
  });
}

function checkChoice1(isCorrect, v, btn) {
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  const fb = document.getElementById('m1-feedback');
  scoreTotal++;
  if (isCorrect) {
    btn.classList.add('correct');
    scoreCorrect++;
    fb.className = 'feedback correct show';
    fb.innerHTML = `✅ <ruby>正解<rt>せいかい</rt></ruby>！<br>${furigana(v.word, v.reading, v.color)} — <span style="color:${v.color};display:${showEnglish?'':'none'}">${v.en}</span><br><small style="color:#555">${rubifySentence(v.ex)}</small><br><small class="eng" style="color:#888;font-style:italic">${v.exEn}</small>`;
    speak(v.word);
  } else {
    btn.classList.add('wrong');
    fb.className = 'feedback wrong show';
    fb.innerHTML = `❌ <ruby>残念<rt>ざんねん</rt></ruby>！ <ruby>正解<rt>せいかい</rt></ruby>は「${furigana(v.word, v.reading, v.color)}」でした。`;
  }
  applyFuriganaState();
  applyEnglishState();
  updateScore();
  document.getElementById('m1-next').style.display = 'block';
}

// ══════════════════════════════════════════════
// モード2：文を並べる
// ══════════════════════════════════════════════
function renderMode2(v) {
  document.getElementById('m2-feedback').className = 'feedback';
  document.getElementById('m2-feedback').innerHTML = '';
  document.getElementById('m2-next').style.display = 'none';
  document.getElementById('m2-check').style.display = 'block';
  document.getElementById('m2-hint').innerHTML =
    `<span style="color:${v.color};font-weight:700">${rubifyWord(v.word)}</span> を<ruby>使<rt>つか</rt></ruby>った<ruby>文<rt>ぶん</rt></ruby>を<ruby>作<rt>つく</rt></ruby>ろう<br>` +
    `<span class="word-english" style="display:${showEnglish?'':'none'}">Make a sentence using "${v.en}"</span>`;
  answerWords = [];
  poolWords   = shuffle([...v.exWords]);
  renderPool();
  renderAnswerArea();
}

function renderPool() {
  const pool = document.getElementById('m2-pool');
  pool.innerHTML = '';
  poolWords.forEach((w, i) => {
    if (w === null) return;
    const card = document.createElement('div');
    card.className = 'word-card';
    card.innerHTML = rubifyWord(w);
    card.dataset.idx = i;
    card.onclick = () => moveToAnswer(i);
    pool.appendChild(card);
  });
}
function renderAnswerArea() {
  const area = document.getElementById('m2-answer');
  area.innerHTML = '';
  answerWords.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'word-card in-answer';
    card.innerHTML = rubifyWord(item.word);
    card.dataset.aidx = i;
    card.onclick = () => removeFromAnswerIdx(i);
    area.appendChild(card);
  });
}

function moveToAnswer(poolIdx) {
  const w = poolWords[poolIdx];
  if (w === null) return;
  answerWords.push({ word: w, poolIdx });
  poolWords[poolIdx] = null;
  renderPool();
  renderAnswerArea();
  applyFuriganaState();
}
function removeFromAnswerIdx(aIdx) {
  const item = answerWords[aIdx];
  poolWords[item.poolIdx] = item.word;
  answerWords.splice(aIdx, 1);
  renderPool();
  renderAnswerArea();
  applyFuriganaState();
}

function resetPool() {
  const v = VOCAB[order[qIdx]];
  answerWords = [];
  poolWords   = shuffle([...v.exWords]);
  renderPool();
  renderAnswerArea();
  document.getElementById('m2-feedback').className = 'feedback';
}

function checkOrder() {
  const v = VOCAB[order[qIdx]];
  const answer = answerWords.map(x => x.word).join('');
  const fb = document.getElementById('m2-feedback');
  scoreTotal++;
  if (answer === v.ex) {
    scoreCorrect++;
    fb.className = 'feedback correct show';
    fb.innerHTML = `✅ <ruby>正解<rt>せいかい</rt></ruby>！「${rubifySentence(v.ex)}」<br><small style="color:#555;display:${showEnglish?'':'none'}">${v.exEn}</small>`;
    speak(v.ex);
    document.getElementById('m2-check').style.display = 'none';
    document.getElementById('m2-next').style.display = 'block';
    document.querySelectorAll('.word-card').forEach(c => c.style.pointerEvents = 'none');
  } else if (answer === '') {
    fb.className = 'feedback wrong show';
    fb.innerHTML = '⚠️ カードを<ruby>並<rt>なら</rt></ruby>べてください。';
    scoreTotal--;
  } else {
    fb.className = 'feedback wrong show';
    fb.innerHTML = '❌ <ruby>残念<rt>ざんねん</rt></ruby>！もう<ruby>一度<rt>いちど</rt></ruby>やってみよう。';
    document.getElementById('m2-check').style.display = 'none';
    document.getElementById('m2-next').style.display = 'block';
  }
  applyFuriganaState();
  applyEnglishState();
  updateScore();
}

// ══════════════════════════════════════════════
// モード3：例文を聞く
// ══════════════════════════════════════════════
function renderMode3(v) {
  document.getElementById('m3-word').innerHTML     = furigana(v.word, v.reading, v.color);
  document.getElementById('m3-english').textContent = v.en;
  document.getElementById('m3-english').style.color = v.color;
  document.getElementById('m3-english').style.display = showEnglish ? '' : 'none';
  document.getElementById('m3-sentence').innerHTML  = rubifySentence(v.ex);
  document.getElementById('m3-sentence-en').textContent = v.exEn;
  document.getElementById('m3-sentence-en').style.display = showEnglish ? '' : 'none';
  setIllust(document.getElementById('m3-illust'), v, 120);
  const btn = document.getElementById('m3-listen');
  btn.className = 'action-btn';
  btn.innerHTML = '🔊 タップして<ruby>聞<rt>き</rt></ruby>く <span class="eng">/ Listen</span>';
}

function speakSentence() {
  const v = VOCAB[order[qIdx]];
  const btn = document.getElementById('m3-listen');
  btn.className = 'action-btn playing';
  btn.innerHTML = '🔊 <ruby>再生中<rt>さいせいちゅう</rt></ruby>...';
  speak(v.ex, () => {
    btn.className = 'action-btn';
    btn.innerHTML = '🔊 タップして<ruby>聞<rt>き</rt></ruby>く <span class="eng">/ Listen</span>';
  });
}

// ══════════════════════════════════════════════
// イラスト表示（いらすとや URL → fallback emoji）
// ══════════════════════════════════════════════
function setIllust(container, v, h) {
  container.innerHTML = '';
  // GAS生成画像 → いらすとや → emoji の順でフォールバック
  const urls = [v.image, v.irasutoya].filter(Boolean);
  let urlIdx = 0;

  function tryNext() {
    if (urlIdx < urls.length) {
      const img = document.createElement('img');
      img.src = urls[urlIdx++];
      img.alt = v.word;
      img.style.height = h + 'px';
      img.style.objectFit = 'contain';
      img.onerror = tryNext;
      container.innerHTML = '';
      container.appendChild(img);
    } else {
      // 全URL失敗 → emoji表示
      const fb = document.createElement('div');
      fb.className = 'illust-fallback';
      fb.textContent = v.emoji;
      container.innerHTML = '';
      container.appendChild(fb);
    }
  }
  tryNext();
}

// ══════════════════════════════════════════════
// 音声再生（Web Speech API）
// ══════════════════════════════════════════════
function speak(text, onEnd) {
  cancelSpeak();
  if (!window.speechSynthesis) return;
  utterance = new SpeechSynthesisUtterance(text);
  utterance.lang  = 'ja-JP';
  utterance.rate  = 0.85;
  utterance.pitch = 1.0;
  if (onEnd) utterance.onend = onEnd;
  speechSynthesis.speak(utterance);
}
function cancelSpeak() {
  if (window.speechSynthesis) speechSynthesis.cancel();
}

// ══════════════════════════════════════════════
// ユーティリティ
// ══════════════════════════════════════════════
function shuffle(arr) {
  for (let i=arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
